id: maxmind-sync
description: Download MaxMind GeoLite2 databases and sync to Google Drive
enabled: true
exec:
  mode: command
  working_directory: /home/mike/cron-services
  command:
    - /usr/bin/bash
    - /home/mike/cron-services/scripts/maxmind-sync.sh
schedule:
  # was: cron '20 5 * * *'
  on_calendar: "*-*-* 05:20:00"
  persistent: true
  randomized_delay_sec: 300
environment:
  variables:
    PATH: /home/mike/.local/bin:/usr/local/bin:/usr/bin:/bin
  files:
    # Provides MAXMIND_KEY. Create from deploy/maxmind.env.example (chmod 600).
    - /home/mike/.config/cron-services/maxmind.env
timeout_sec: 1800
restart:
  policy: on-failure
  restart_sec: 120
  start_limit_burst: 3
  start_limit_interval_sec: 3600
security:
  profile: basic
  read_write_paths:
    - /home/mike/.config/rclone
    - /home/mike/.cache/cron-services
resources:
  memory_max: 512M
  cpu_quota: "75%"
metadata:
  migrated_from: .github/workflows/maxmind.yml
